  <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>蘇菲圍巾助手 V8</title>
    <style>
        :root { 
            --bg: #fdfaf5; --card: #ffffff; --text: #5d4037; --accent: #d84315; 
            --inc-alert: #ffccc7; --dec-alert: #bae7ff; --instruction-bg: #f8f1e9;
        }
        body { background: var(--bg); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; transition: background 0.3s; color: var(--text); }
        .is-inc { background: var(--inc-alert) !important; }
        .is-dec { background: var(--dec-alert) !important; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 28px; padding: 25px; box-shadow: 0 10px 30px rgba(93, 64, 55, 0.08); margin-bottom: 20px; position: relative; }
        
        /* 核心狀態顯示 */
        .main-display { text-align: center; border-top: 8px solid var(--accent); }
        .side-label { font-weight: bold; opacity: 0.5; font-size: 1.1rem; }
        .row-num { font-size: 6.5rem; font-weight: 900; margin: 0; line-height: 1; }
        .sts-display { font-size: 2.2rem; font-weight: bold; margin: 15px 0; display: flex; align-items: baseline; justify-content: center; gap: 5px; }
        .sts-unit { font-size: 1.2rem; color: var(--accent); }
        
        .instruction-box { 
            background: var(--instruction-bg); border-radius: 22px; padding: 20px; margin: 15px 0; min-height: 110px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 1.15rem; line-height: 1.7; color: #6d4c41; border: 1px dashed #d7ccc8;
        }
        .ins-row { min-height: 1.2em; text-align: center; width: 100%; }
        .ins-highlight { font-weight: bold; color: var(--accent); margin-bottom: 4px; }
        .ins-row:empty { display: none; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        button { padding: 18px; font-size: 1.25rem; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .next-btn { background: var(--text); color: #fff; box-shadow: 0 6px #3e2723; }
        .prev-btn { background: #f0f0f0; color: #9e9e9e; font-size: 1rem; }

        /* 織圖總覽標題列與百分比 */
        .table-header-flex { display: flex; justify-content: space-between; align-items: center; margin: 10px 15px; }
        .percent-tag { font-size: 1.1rem; font-weight: bold; color: var(--text); opacity: 0.7; }

        .scroll-container { height: 320px; overflow-y: scroll; border-radius: 15px; border: 1px solid #efebe9; scroll-behavior: smooth; background: #fff; }
        .ref-table { width: 100%; border-collapse: collapse; text-align: center; }
        .ref-table th { position: sticky; top: 0; background: #fafafa; padding: 12px 0; color: #a1887f; z-index: 2; border-bottom: 1px solid #eee; }
        .active-row { background: #fff8e1 !important; font-weight: bold; color: var(--accent); }
        .ref-table td { padding: 14px 0; border-bottom: 1px solid #fdfdfd; }

        .log-list { max-height: 150px; overflow-y: auto; font-size: 0.9rem; }
        .log-item { background: #fdfbf9; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 5px solid #dcb08b; display: flex; justify-content: space-between; }
        .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.95rem; }
        input { width: 65px; padding: 10px; border-radius: 12px; border: 1px solid #d7ccc8; text-align: center; font-size: 1.1rem; }
        .set-btn { background: #8d6e63; color: white; padding: 10px 18px; border-radius: 12px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card main-display" id="mainCard">
        <div id="sideTag" class="side-label">RS/WS</div>
        <div style="color: #bbb; font-size: 0.75rem; letter-spacing: 3px; margin-top: 5px;">CURRENT ROW</div>
        <div class="row-num" id="curR">1</div>
        <div class="sts-display">
            <span id="stsNum">6</span>
            <span class="sts-unit">針</span>
        </div>
        
        <div class="instruction-box" id="stepNote">
            <div class="ins-row ins-highlight" id="ins-1"></div>
            <div class="ins-row" id="ins-2"></div>
            <div class="ins-row" id="ins-3"></div>
        </div>
        
        <div class="btn-group">
            <button class="next-btn" onclick="move(1)">下一排 (Next Row) ✅</button>
            <button class="prev-btn" onclick="move(-1)">回到上一排 (Back)</button>
        </div>
    </div>

    <div class="card" style="padding: 10px;">
        <div class="table-header-flex">
            <span style="font-weight: bold; color: #8d6e63;">織圖總覽</span>
            <span class="percent-tag" id="percentText">0%</span>
        </div>
        <div class="scroll-container" id="scrollBox">
            <table class="ref-table">
                <thead><tr><th>排數</th><th>正反</th><th>針數</th><th>動作</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div style="font-weight: bold; margin-bottom: 10px;">編織日誌紀錄</div>
        <div id="totalTime" style="color: var(--accent); font-weight: bold; margin-bottom: 15px;">總時長：0 分鐘</div>
        <div class="log-list" id="logList"></div>
    </div>

    <div class="card">
        <div class="config-row"><span>目標最大針數</span><div><input type="number" id="maxIn" value="28"><button class="set-btn" onclick="setM()">設定</button></div></div>
        <div class="config-row"><span>目前排數同步</span><div><input type="number" id="curRowIn" value="1"><button class="set-btn" onclick="setR()">同步</button></div></div>
    </div>
</div>

<script>
    let r = 1, maxS = 28, logs = [], totalMs = 0, lastTime = Date.now();
    const STORAGE_KEY = "Sophie_Stable_Progress";

    try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved) {
            r = saved.r || 1; maxS = saved.maxS || 28; logs = saved.logs || []; totalMs = saved.totalMs || 0;
            document.getElementById('maxIn').value = maxS;
        }
    } catch(e) {}

    function setM() { maxS = parseInt(document.getElementById('maxIn').value); save(); render(); }
    function setR() { r = parseInt(document.getElementById('curRowIn').value); save(); render(); }

    function getInfo(row) {
        let sts = 6, act = "-", displaySts = "", step1 = "", step2 = "", step3 = "";
        let incRows = (maxS - 6) * 8;
        const isRS = (row % 2 === 0);

        if (row <= incRows) {
            let b = 6 + Math.floor((row - 1) / 8);
            if (row % 8 === 0) {
                act = "加針"; displaySts = `${b} ⮕ ${b+1}`; sts = b+1;
                step1 = "★ 加針排"; step2 = "織2下針，kfb加針，下針織到剩3針，"; step3 = "線帶至針前，反針方向滑3針。";
            } else { sts = b; displaySts = sts; step2 = "織下針至最後3針，"; step3 = "線帶至針前，反針方向滑3針。"; }
        } else if (row <= incRows + 8) {
            sts = maxS; displaySts = sts; step1 = "平織區"; step2 = "織下針至最後3針，"; step3 = "線帶至針前，反針方向滑3針。";
        } else {
            let d = Math.floor((row - incRows - 9) / 8);
            let b = maxS - d;
            if ((row - incRows - 9) % 8 === 1) {
                act = "減針"; displaySts = `${b} ⮕ ${b-1}`; sts = b-1;
                step1 = "★ 減針排"; step2 = "織3下針，skp減針，下針織到剩3針，"; step3 = "線帶至針前，反針方向滑3針。";
            } else { sts = b; displaySts = sts; step2 = "織下針至最後3針，"; step3 = "線帶至針前，反針方向滑3針。"; }
        }
        return { sts, act, displaySts, step1, step2, step3 };
    }

    function move(dir) {
        const now = Date.now(); const diff = now - lastTime;
        if (dir > 0) {
            if (diff < 300000) totalMs += diff;
            logs.unshift({ type: 'next', r, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            r++;
        } else if (r > 1) {
            r--; logs.unshift({ type: 'back', r, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        }
        lastTime = now; save(); render();
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ r, maxS, logs: logs.slice(0, 30), totalMs }));
    }

    function render() {
        const info = getInfo(r);
        document.getElementById('curR').innerText = r;
        document.getElementById('curRowIn').value = r;
        document.getElementById('stsNum').innerHTML = info.displaySts;
        
        // 進度計算：加針段 + 平織段(8) + 減針段
        const totalEstimate = (maxS - 6) * 16 + 8;
        const progress = Math.min(99, Math.round((r / totalEstimate) * 100));
        document.getElementById('percentText').innerText = progress + "%";

        document.getElementById('ins-1').innerText = info.step1;
        document.getElementById('ins-2').innerText = info.step2;
        document.getElementById('ins-3').innerText = info.step3;

        document.getElementById('sideTag').innerText = (r % 2 === 0) ? "RS (正面)" : "WS (反面)";
        document.body.className = info.act === "加針" ? "is-inc" : (info.act === "減針" ? "is-dec" : "");
        document.getElementById('totalTime').innerText = `總編織時長：${Math.round(totalMs/60000)} 分鐘`;

        let html = "";
        for(let i=1; i <= r + 50; i++) {
            let inf = getInfo(i);
            html += `<tr id="row-${i}" class="${i===r?'active-row':''}">
                <td>R${i}</td><td>${i%2===0?'RS':'WS'}</td><td>${inf.displaySts} 針</td><td>${inf.act}</td>
            </tr>`;
        }
        document.getElementById('tableBody').innerHTML = html;
        const target = document.getElementById(`row-${r}`);
        const box = document.getElementById('scrollBox');
        if (target) { box.scrollTop = target.offsetTop - (target.offsetHeight * 3); }

        document.getElementById('logList').innerHTML = logs.map(l => `
            <div class="log-item ${l.type==='back'?'log-back':''}">
                <span>${l.type==='next'?'✅ 完成 Row '+l.r : '◀️ 退回 Row '+l.r}</span>
                <span style="color:#999">${l.time}</span>
            </div>`).join('');
    }
    render();
</script>
</body>
</html>
    
  </body>
  
</html>
